<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Epic Arc Quick-URL Builder</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:20px;color:#111}
    label{display:block;margin-top:10px;font-weight:600}
    select,input,button,textarea{margin-top:6px;padding:8px;border:1px solid #bbb;border-radius:6px;width:100%;max-width:720px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .col{flex:1 1 240px}
    .small{max-width:240px}
    pre{background:#f7f7f7;border:1px solid #eee;padding:10px;border-radius:6px;overflow:auto}
    .muted{color:#666;font-size:0.9em}
    .actions{margin-top:12px;display:flex;gap:8px}
  </style>
</head>
<body>
  <h1>Epic Arc Secret-URL Builder</h1>
  <p class="muted">Build secret POST URLs (or perform the action) for the Epic Arc CGI. Tokens are not stored — paste them here to generate a URL.</p>

  <label>Base CGI Path</label>
  <input id="basePath" value="/cgi-bin/epictracker.cgi" />
  <div class="row">
    <div class="col small">
      <label><input type="checkbox" id="useApi" /> Use Flask API (/api) for local testing</label>
    </div>
    <div class="col small">
      <label>Secret token (query param)</label>
      <input id="token" placeholder="paste secret token here" />
    </div>
  </div>

  <label>Player / Character</label>
  <div class="row">
    <div class="col">
      <select id="player"></select>
    </div>
    <div class="col">
      <select id="character"></select>
    </div>
  </div>

  <label>Arc</label>
  <div class="row">
    <div class="col">
      <select id="arc"></select>
    </div>
    <div class="col">
      <select id="faction"></select>
    </div>
  </div>

  <label>Action</label>
  <select id="action"><option value="mark-mid-choice">mark-mid-choice (set mid-arc choice)</option><option value="deliver">deliver (final delivery)</option></select>

  <div class="actions">
    <button id="btnGen">Generate URL</button>
    <button id="btnCopy">Copy URL</button>
    <button id="btnCurl">Show cURL</button>
    <button id="btnDo">Perform Action</button>
  </div>

  <label>Generated URL</label>
  <input id="generated" readonly />

  <label>cURL Preview</label>
  <pre id="curl">(click Show cURL)</pre>

  <label>Response</label>
  <pre id="response">(no response yet)</pre>

  <script>
    const basePathEl = document.getElementById('basePath')
    const useApi = document.getElementById('useApi')
    const tokenEl = document.getElementById('token')
    const playerEl = document.getElementById('player')
    const charEl = document.getElementById('character')
    const arcEl = document.getElementById('arc')
    const factionEl = document.getElementById('faction')
    const actionEl = document.getElementById('action')
    const genEl = document.getElementById('generated')
    const curlEl = document.getElementById('curl')
    const respEl = document.getElementById('response')

    let arcs = {}
    let players = {}

    function apiBase(){
      if(useApi.checked) return (basePathEl.value || '') + '/api'
      return basePathEl.value || '/cgi-bin/epictracker.cgi'
    }

    async function fetchJson(path){
      const url = (path.startsWith('/') ? '' : '') + path
      try{
        const r = await fetch(url)
        if(!r.ok) throw new Error('fetch failed '+r.status)
        return await r.json()
      }catch(e){
        console.warn('fetch failed', path, e)
        return null
      }
    }

    async function loadData(){
      const base = apiBase()
      // try arcs and players endpoints at base + '/arcs' etc
      let arcsData = null
      let playersData = null
      try{
        arcsData = await fetchJson(base + '/arcs')
        playersData = await fetchJson(base + '/players')
      }catch(e){
        console.warn('loadData error', e)
      }
      if(!arcsData){
        // try fallback to /api/arcs directly
        arcsData = await fetchJson('/api/arcs')
        playersData = await fetchJson('/api/players')
      }
      if(arcsData){
        arcs = arcsData
        fillArcs()
      }
      if(playersData){
        players = playersData
        fillPlayers()
      }
    }

    function fillPlayers(){
      playerEl.innerHTML = ''
      charEl.innerHTML = ''
      const keys = Object.keys(players).sort()
      for(const p of keys){
        const opt = document.createElement('option')
        opt.value = p
        opt.textContent = p
        playerEl.appendChild(opt)
      }
      playerEl.dispatchEvent(new Event('change'))
    }

    function fillArcs(){
      arcEl.innerHTML = ''
      const keys = Object.keys(arcs).sort()
      for(const k of keys){
        const opt = document.createElement('option')
        opt.value = k
        const name = arcs[k].name || k
        opt.textContent = `${k} — ${name}`
        arcEl.appendChild(opt)
      }
      arcEl.dispatchEvent(new Event('change'))
    }

    playerEl.addEventListener('change', ()=>{
      const p = playerEl.value
      charEl.innerHTML = ''
      const chars = players[p] || []
      for(const c of chars){
        const o = document.createElement('option'); o.value = c; o.textContent=c; charEl.appendChild(o)
      }
    })

    arcEl.addEventListener('change', ()=>{
      const k = arcEl.value
      factionEl.innerHTML = ''
      if(!k || !arcs[k]) return
      const allowed = arcs[k].allowed || []
      for(const f of allowed){
        const o = document.createElement('option'); o.value = f; o.textContent = f; factionEl.appendChild(o)
      }
    })

    document.getElementById('btnGen').addEventListener('click', ()=>{
      const base = basePathEl.value.trim() || '/cgi-bin/epictracker.cgi'
      const player = playerEl.value
      const character = charEl.value
      const action = actionEl.value
      if(!player || !character){ alert('select player and character'); return }
      let url = base.replace(/\/$/, '') + '/character/' + encodeURIComponent(player) + '/' + encodeURIComponent(character) + '/' + action
      const token = tokenEl.value.trim()
      if(token) url += '?token=' + encodeURIComponent(token)
      genEl.value = url
      curlEl.textContent = '(click Show cURL)'
    })

    document.getElementById('btnCopy').addEventListener('click', async ()=>{
      const text = genEl.value
      if(!text) return alert('generate URL first')
      try{ await navigator.clipboard.writeText(text); alert('copied') }catch(e){ alert('copy failed: '+e) }
    })

    document.getElementById('btnCurl').addEventListener('click', ()=>{
      const url = genEl.value
      if(!url) return alert('generate URL first')
      const arc = arcEl.value
      const faction = factionEl.value
      const body = JSON.stringify({arc: arc, faction: faction})
      const curl = `curl -X POST '${url}' -H 'Content-Type: application/json' -d '${body}'`
      curlEl.textContent = curl
    })

    document.getElementById('btnDo').addEventListener('click', async ()=>{
      const url = genEl.value
      if(!url) return alert('generate URL first')
      const arc = arcEl.value
      const faction = factionEl.value
      try{
        const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({arc: arc, faction: faction})})
        const text = await r.text()
        respEl.textContent = `HTTP ${r.status}\n` + text
      }catch(e){
        respEl.textContent = 'error: '+e
      }
    })

    // toggle useApi behaviour
    useApi.addEventListener('change', ()=>{
      if(useApi.checked){ basePathEl.value = '/api' }
      else { basePathEl.value = '/cgi-bin/epictracker.cgi' }
      loadData()
    })

    loadData()
  </script>
</body>
</html>
