<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} - {{ end }}{{ .Site.Title }}</title>
  <link rel="stylesheet" href="/style.css">
  {{ with .OutputFormats.Get "HTMLFeed" }}
  <link rel="alternate" type="text/html" href="{{ .Permalink }}" title="{{ $.Site.Title }} Feed">
  {{ end }}
</head>
<body>
  <header class="main-header">
    <a href=".."><img id="baby-logo" src="/easyp.png" alt="Easyp Logo"></a>
    <div class="title-container">
      <h1 class="main-title">Easyp Easy HTTPS Server</h1>
      <p class="pea-quote">The easyp pea says: <em>My favourite peas are easy HTTPS</em></p>
      <p>
      <a href="/features" class="header-link">Features</a>
      <a href="/installation" class="header-link">Installation</a>
      <a href="/extensions" class="header-link">Extensions</a>
      <a href="/configuration" class="header-link">Configuration</a>
      <a href="/troubleshooting" class="header-link">Troubleshooting</a>
      <a href="/development" class="header-link">Development</a>
      <a href="/release" class="header-link">Releases</a>
      <a href="https://github.com/gmatht/easyp/issues" class="header-link">Bugs</a>
      </p>
    </div>
    <img id="baby-logo-reflected" src="/easyp.png" alt="Easyp Logo Reflected">
  </header>
  {{ block "main" . }}{{ end }}
</body>
</html>
