{{ define "main" }}
<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }} - {{ .Title | default "Feed" }}</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <a href=".."><img id="baby-logo" src="/easyp.png"></a>
  <div class="box">
    <div class="content">
      <h1>{{ .Site.Title }} - {{ .Title | default "Feed" }}</h1>
      <ul>
        {{ range .Pages }}
        <li>
          <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
          <p><strong>Published:</strong> {{ .Date.Format "January 2, 2006" }}</p>
          {{ if .Summary }}
          <div class="summary">{{ .Summary }}</div>
          {{ end }}
        </li>
        {{ end }}
      </ul>
    </div>
  </div>
</body>
</html>
{{ end }}
